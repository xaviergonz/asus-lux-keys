name: .NET Desktop CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_VERSION: 10.0.x

jobs:
  build:
    name: Build and publish Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build
        run: powershell -NoProfile -ExecutionPolicy Bypass -File ./scripts/build.ps1 -Configuration Release

      - name: Test
        run: powershell -NoProfile -ExecutionPolicy Bypass -File ./scripts/test.ps1 -Configuration Release

      - name: Publish app
        run: powershell -NoProfile -ExecutionPolicy Bypass -File ./scripts/publish.ps1 -Configuration Release -Runtime win-x64 -Output publish

      - name: Package app
        run: Compress-Archive -Path publish\* -DestinationPath AsusLuxKeys-win-x64.zip -Force

      - name: Upload app artifact
        uses: actions/upload-artifact@v6
        with:
          name: AsusLuxKeys-win-x64
          path: AsusLuxKeys-win-x64.zip

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        run: gh release create $env:GITHUB_REF_NAME AsusLuxKeys-win-x64.zip --title $env:GITHUB_REF_NAME --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
