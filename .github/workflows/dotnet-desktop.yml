name: .NET Desktop CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: 10.0.x
  SOLUTION_FILE: AsusLuxKeys.slnx
  APP_PROJECT: src/AsusLuxKeys/AsusLuxKeys.csproj

jobs:
  build:
    name: Build and publish Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore $env:SOLUTION_FILE

      - name: Build
        run: dotnet build $env:SOLUTION_FILE --configuration Release --no-restore

      - name: Publish app
        run: dotnet publish $env:APP_PROJECT --configuration Release --runtime win-x64 --self-contained false --output publish

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: AsusLuxKeys-win-x64
          path: publish
