name: .NET Desktop CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_VERSION: 10.0.x
  SOLUTION_FILE: AsusLuxKeys.slnx
  APP_PROJECT: src/AsusLuxKeys/AsusLuxKeys.csproj

jobs:
  build:
    name: Build and publish Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore $env:SOLUTION_FILE

      - name: Build
        run: dotnet build $env:SOLUTION_FILE --configuration Release --no-restore

      - name: Publish app
        run: dotnet publish $env:APP_PROJECT --configuration Release --runtime win-x64 --self-contained false --output publish

      - name: Package app
        run: Compress-Archive -Path publish\* -DestinationPath AsusLuxKeys-win-x64.zip -Force

      - name: Upload app artifact
        uses: actions/upload-artifact@v6
        with:
          name: AsusLuxKeys-win-x64
          path: AsusLuxKeys-win-x64.zip

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        run: gh release create $env:GITHUB_REF_NAME AsusLuxKeys-win-x64.zip --title $env:GITHUB_REF_NAME --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
